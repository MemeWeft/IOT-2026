<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Van der Werf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2F5F0; --surface: #FFFFFF; --border: #E2EAE0;
      --text: #1C2B1C; --muted: #7A8A7A;
      --green-dark: #2D6A4F; --green-mid: #4CAF82; --green-soft: #D4EDDA;
      --red: #E05A5A;
      --radius: 16px; --radius-sm: 10px;
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--green-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }

    /* Logo */
    .login-logo {
      width: 200px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 36px 32px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .login-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--green-mid); background: #fff; }

    .error-box {
      background: #FCE0E0;
      border: 1px solid #F0BBBB;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.18s;
    }
    .login-btn:hover { background: #235840; }

    .login-footer {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <img class="login-logo"
       src="https://groenwerf.nl/wp-content/uploads/2023/10/logo-two-retina-5.png"
       alt="Groenvoorziening A.J. van der Werf" />

  <div class="login-card">
    <h1 class="login-title">Inloggen</h1>
    <p class="login-sub">Voer je gegevens in om toegang te krijgen.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login_post') }}">
      <div class="field">
        <label for="username">Gebruikersnaam</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required />
      </div>
      <div class="field">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn">Inloggen →</button>
    </form>
  </div>

  <p class="login-footer">Groenvoorziening A.J. van der Werf B.V. &nbsp;·&nbsp; Bedum</p>
</div>
</body>
</html>
